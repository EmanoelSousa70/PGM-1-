<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercícios DOM 02</title>

<link rel="stylesheet" href="estilos.css">
<script src="scripts.js" defer></script>

<body>

<h1>Questão 1 e 2</h1>

<button id="botaoErro">Mostrar Erro</button>
<div id="mensagemErro" class="oculto"></div>

<br><br>

<label for="caixaDeTexto">Digite o texto:</label>
<input type="text" id="caixaDeTexto">

<button id="botaoExibir">Exibir</button>

<div id="conteudo"></div>

<hr>

<h1>Questão 3 - Taxa de Engajamento</h1>

<label>Número de Interações:</label>
<input type="text" id="interacoes">

<input type="text" id="visualizacoes">

<button id="calcularEngajamento">Calcular</button>

<div id="erroEngajamento" class="oculto"></div>

<div id="resultadoEngajamento"></div>

<hr>

<h1>Questão 4 - Upload de Imagem</h1>

<input type="file" id="uploadImagem" accept="image/*">

<button id="carregarImagem">Carregar Imagem</button>

<div id="resultado"></div>

<hr>

<div>

</div>

<div>

Enviar Seleção
</button>

<h1>Questão 7, 8 e 9 - Hashtags</h1>

<input type="text" id="hashtagInput">

<button id="adicionarHashtag">
Adicionar
</button>

</button>
